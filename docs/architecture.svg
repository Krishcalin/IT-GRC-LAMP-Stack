<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" fill="none" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="IT-GRC Portal LAMP/Laravel architecture — request flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1120"/><stop offset="100%" stop-color="#0e1729"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1080" height="600" rx="16" fill="url(#bg)"/>
  <text x="540" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#f1f5f9">IT-GRC Portal — LAMP / Laravel architecture</text>
  <text x="540" y="54" text-anchor="middle" font-size="12.5" fill="#94a3b8">Server-rendered request flow · no JavaScript build step</text>

  <!-- Band 1: Client -->
  <g transform="translate(70,72)">
    <rect width="940" height="74" rx="12" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.35)"/>
    <rect width="6" height="74" rx="3" fill="#22d3ee"/>
    <text x="30" y="30" font-size="11" font-weight="700" letter-spacing="1.5" fill="#22d3ee">CLIENT</text>
    <text x="30" y="54" font-size="17" font-weight="700" fill="#f1f5f9">Browser</text>
    <text x="250" y="34" font-size="12.5" fill="#94a3b8">Server-rendered Blade HTML — styled &amp; made interactive by</text>
    <text x="250" y="54" font-size="12.5" fill="#94a3b8">Tailwind CSS · Alpine.js · Chart.js (loaded from CDN — no npm / Vite)</text>
  </g>
  <line x1="540" y1="146" x2="540" y2="172" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="552" y="164" font-size="10" font-weight="600" fill="#64748b">HTTPS</text>

  <!-- Band 2: Web server -->
  <g transform="translate(70,176)">
    <rect width="940" height="74" rx="12" fill="rgba(248,113,113,0.06)" stroke="rgba(248,113,113,0.35)"/>
    <rect width="6" height="74" rx="3" fill="#f87171"/>
    <text x="30" y="30" font-size="11" font-weight="700" letter-spacing="1.5" fill="#f87171">WEB SERVER</text>
    <text x="30" y="54" font-size="17" font-weight="700" fill="#f1f5f9">Apache 2.4</text>
    <text x="250" y="34" font-size="12.5" fill="#94a3b8">mod_rewrite · DocumentRoot = <tspan fill="#cbd5e1">public/</tspan> · public/.htaccess front-controller rewrites</text>
    <text x="250" y="54" font-size="12.5" fill="#94a3b8"><tspan fill="#cbd5e1">public/index.php</tspan> boots the framework (nginx + PHP-FPM also supported)</text>
  </g>
  <line x1="540" y1="250" x2="540" y2="276" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="552" y="268" font-size="10" font-weight="600" fill="#64748b">PHP 8.2</text>

  <!-- Band 3: Application -->
  <g transform="translate(70,280)">
    <rect width="940" height="96" rx="12" fill="rgba(129,140,248,0.06)" stroke="rgba(129,140,248,0.35)"/>
    <rect width="6" height="96" rx="3" fill="#818cf8"/>
    <text x="30" y="28" font-size="11" font-weight="700" letter-spacing="1.5" fill="#818cf8">APPLICATION</text>
    <text x="30" y="52" font-size="17" font-weight="700" fill="#f1f5f9">Laravel 12</text>
    <text x="30" y="72" font-size="12.5" fill="#94a3b8">PHP 8.2</text>
    <g transform="translate(250,16)" font-size="11.5" font-weight="600">
      <g><rect width="120" height="26" rx="6" fill="rgba(148,163,184,0.10)" stroke="rgba(148,163,184,0.3)"/><text x="60" y="17" text-anchor="middle" fill="#cbd5e1">routes/web.php</text></g>
      <text x="128" y="17" fill="#64748b">&#8594;</text>
      <g transform="translate(142,0)"><rect width="172" height="26" rx="6" fill="rgba(148,163,184,0.10)" stroke="rgba(148,163,184,0.3)"/><text x="86" y="17" text-anchor="middle" fill="#cbd5e1">Session auth + RBAC</text></g>
      <text x="320" y="17" fill="#64748b">&#8594;</text>
      <g transform="translate(334,0)"><rect width="184" height="26" rx="6" fill="rgba(148,163,184,0.10)" stroke="rgba(148,163,184,0.3)"/><text x="92" y="17" text-anchor="middle" fill="#cbd5e1">17 module controllers</text></g>
      <g transform="translate(0,38)"><rect width="518" height="26" rx="6" fill="rgba(129,140,248,0.10)" stroke="rgba(129,140,248,0.3)"/><text x="259" y="17" text-anchor="middle" fill="#c7d2fe">Support helpers — Scoring · Posture · Analytics · Refs · Activity</text></g>
    </g>
  </g>
  <line x1="540" y1="376" x2="540" y2="402" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="552" y="394" font-size="10" font-weight="600" fill="#64748b">render / persist</text>

  <!-- Band 4: Domain / views -->
  <g transform="translate(70,406)">
    <rect width="940" height="74" rx="12" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.35)"/>
    <rect width="6" height="74" rx="3" fill="#a78bfa"/>
    <text x="30" y="30" font-size="11" font-weight="700" letter-spacing="1.5" fill="#a78bfa">DOMAIN &amp; VIEWS</text>
    <text x="30" y="54" font-size="17" font-weight="700" fill="#f1f5f9">Eloquent + Blade</text>
    <text x="280" y="34" font-size="12.5" fill="#94a3b8">24 Eloquent models (UUID PKs, derived accessors) · Blade views per module</text>
    <text x="280" y="54" font-size="12.5" fill="#94a3b8">reusable components: card · badge · field · owner-select · heatmap</text>
  </g>
  <line x1="540" y1="480" x2="540" y2="506" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="552" y="498" font-size="10" font-weight="600" fill="#64748b">SQL (PDO)</text>

  <!-- Band 5: Data -->
  <g transform="translate(70,510)">
    <rect width="940" height="80" rx="12" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.35)"/>
    <rect width="6" height="80" rx="3" fill="#38bdf8"/>
    <text x="30" y="30" font-size="11" font-weight="700" letter-spacing="1.5" fill="#38bdf8">DATA</text>
    <text x="30" y="54" font-size="17" font-weight="700" fill="#f1f5f9">MySQL 8</text>
    <text x="30" y="72" font-size="12.5" fill="#94a3b8">+ MariaDB</text>
    <text x="250" y="32" font-size="12.5" fill="#94a3b8">28 tables (controls · risks · clauses · soa · audits · … · activity_log) + <tspan fill="#cbd5e1">storage/app/evidence</tspan></text>
    <text x="250" y="54" font-size="12.5" fill="#94a3b8">Seeded by <tspan fill="#cbd5e1">php artisan migrate --seed</tspan> from database/seeders/data/*.json —</text>
    <text x="250" y="72" font-size="12.5" fill="#94a3b8">148 controls · 96 crosswalk mappings · 30 clauses · 17 documents · sample data</text>
  </g>
</svg>

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  laravel:
    name: Laravel (lint + test + migrate)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: itgrc
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, bcmath, intl, zip
          coverage: none

      - name: Copy environment file
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate

      - name: Lint PHP files (php -l)
        run: find app config database routes tests -name "*.php" -print0 | xargs -0 -n1 -P4 php -l

      - name: Run tests (Unit + Feature on SQLite)
        run: php artisan test

      - name: Migrate & seed against MySQL
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: itgrc
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force --seed

      - name: Verify migrations roll back cleanly
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: itgrc
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate:fresh --force
